<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}PICKPET — Stray Dog Adoption{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .notif-badge {
      position: absolute;
      top: -7px;
      right: -14px;
      background: #E8614B;
      color: #fff;
      border-radius: 50%;
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      font-size: 0.65rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      box-shadow: 0 1px 4px rgba(232,97,75,0.35);
      pointer-events: none;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

  <div id="loading-screen" role="status" aria-label="載入中">
    <div class="loading-text-group">
      <div class="loading-brand">PICKPET</div>
      <div class="loading-tagline">A new beginning for every dog</div>
    </div>
    <div class="loading-track">
      <div class="loading-dog-runner">
        <span class="loading-dog-bouncer">🐕</span>
      </div>
    </div>
  </div>

  {% include 'components/navbar.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'components/footer.html' %}

  <div class="toast" id="toast">
    <span id="toastIcon">✅</span>
    <span id="toastMsg">Done</span>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block extra_js %}{% endblock %}

  <script>
    (function () {
      var el = document.getElementById('loading-screen');
      if (!el) return;

      var currentPath = window.location.pathname;
      var lastPath = sessionStorage.getItem('pp_last_path');

      // Skip animation if reloading the same page (e.g. filter submit)
      if (lastPath === currentPath) {
        el.style.display = 'none';
        return;
      }

      sessionStorage.setItem('pp_last_path', currentPath);

      setTimeout(function () {
        el.classList.add('loading-hide');
        el.addEventListener('transitionend', function () {
          el.style.display = 'none';
        }, { once: true });
      }, 2100);
    }());
  </script>
</body>
</html>
